<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Quiz — Welcome</title>
    <link rel="stylesheet" href="css/codestyle.css">
</head>
<body>

<div class="role-container">

    <!-- Brand Header -->
    <div class="role-brand">
        <div class="brand-logo">🎓</div>
        <h1>Amrita <span>Quiz</span></h1>
        <p>Online Quiz Management System &mdash; Select your role to continue</p>
    </div>

    <!-- Role Cards -->
    <div class="role-cards">

        <!-- Teacher Card -->
        <div class="role-card teacher" onclick="goTo('TeacherLogin.html')">
            <span class="role-icon">👩‍🏫</span>
            <h2>Teacher</h2>
            <p>Create, manage and publish quizzes for your students.</p>
            <button class="role-btn" type="button">Login as Teacher</button>
        </div>

        <!-- Student Card -->
        <div class="role-card student" onclick="goTo('StudentLogin.html')">
            <span class="role-icon">📚</span>
            <h2>Student</h2>
            <p>Attend the quiz assigned by your teacher and view your score.</p>
            <button class="role-btn" type="button">Login as Student</button>
        </div>

    </div>

</div>


<script src="js/app.js"></script>
</body>
</html>
